<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/all.css">

  <title>Random Number</title>
</head>

<body>
  <div class="random">
    <h1>Guess The Number </h1>
    <p>Try to guess the number between 1 and 100</p>

    <div class="game-box">
      <h2>guess now <i class="fa-solid fa-hand-point-down"></i></h2>

      <div class="box">
        <input type="text" id="centered-card" placeholder="Enter your guess...">
        <button  id="Check">Check <i class="fa-solid fa-circle-check"></i> </button>
      </div><!-- box -->
      <div id="content">Result</div>
      <button id="restart">Restart Game <i class="fa-solid fa-rotate"></i></button>
      <span id="Attempts">Attempts</span>

    </div><!--game-box  -->

  </div> <!--random  -->
  <script src="java/script.js"></script>
</body>

</html>
